  <style>
    .course{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:calc(var(--nav-h) + var(--space-xl)) var(--space-lg) var(--space-3xl)}
    .course__back{display:inline-flex;align-items:center;gap:6px;font-size:.825rem;color:var(--ink-muted);margin-bottom:var(--space-lg);transition:color .3s;cursor:pointer;border:none;background:none}
    .course__back:hover{color:var(--accent)}
    .course__meta{display:flex;align-items:center;gap:var(--space-md);margin-bottom:var(--space-md);flex-wrap:wrap}
    .course__badge{font-family:var(--font-mono);font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-glow);padding:4px 12px;border-radius:20px}
    .course__title{font-family:var(--font-body);font-size:1.6rem;font-weight:700;letter-spacing:-.01em;line-height:1.2;margin-bottom:var(--space-md)}
    .course p{font-size:.95rem;line-height:1.85;color:var(--ink);margin-bottom:var(--space-md)}
    .course ol,.course ul{margin-bottom:var(--space-md);padding-left:var(--space-lg)}
    .course ol li,.course ul li{font-size:.95rem;line-height:1.85;color:var(--ink);margin-bottom:6px}
    .math-display{text-align:center;padding:var(--space-md) 0;overflow-x:hidden}
    .annale-exercice{margin-bottom:var(--space-2xl);padding:var(--space-lg);background:var(--bg-card);border:1px solid var(--border);border-radius:16px}
    .annale-exercice__title{font-family:var(--font-body);font-size:1.5rem;font-weight:600;margin-bottom:var(--space-lg);padding-bottom:var(--space-sm);border-bottom:2px solid var(--accent);display:flex;align-items:baseline;gap:var(--space-sm)}
    .annale-partie{margin-top:var(--space-xl);margin-bottom:var(--space-lg)}
    .annale-partie__title{font-family:var(--font-body);font-size:1.25rem;font-weight:600;color:var(--accent);margin-bottom:var(--space-md)}
    .question{margin-bottom:var(--space-lg);padding-left:var(--space-md);border-left:2px solid var(--border)}
    .question__num{font-family:var(--font-mono);font-size:.8rem;font-weight:600;color:var(--accent);margin-bottom:4px;display:block}
    .question p{margin-bottom:var(--space-sm)}
    .question ol{padding-left:var(--space-lg);margin-top:var(--space-sm)}
    .question ol li{margin-bottom:4px}

    /* Correction reveal */
    .correction-reveal{margin-top:var(--space-2xl);padding-top:var(--space-xl);border-top:2px dashed var(--border)}
    .correction-reveal__btn{font-family:var(--font-body);font-size:.9rem;font-weight:600;color:#fff;background:var(--accent);border:none;padding:12px 28px;border-radius:10px;cursor:pointer;transition:all .3s var(--ease-out);display:flex;align-items:center;gap:8px;margin:0 auto}
    .correction-reveal__btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(196,135,59,.3)}
    .correction-reveal__content{display:none;margin-top:var(--space-xl)}
    .correction-reveal__content.visible{display:block;animation:fadeUp .5s var(--ease-out)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .corr-item{margin-bottom:var(--space-xl);padding:var(--space-lg);background:rgba(196,135,59,.04);border-left:3px solid var(--accent);border-radius:0 8px 8px 0}
    .corr-item__q{font-family:var(--font-mono);font-size:.75rem;font-weight:700;color:var(--accent);margin-bottom:var(--space-md)}
    .corr-item__body{font-size:.95rem;line-height:1.85;color:var(--ink-light)}
    .corr-item__body p{margin-bottom:var(--space-md);font-size:.95rem}
    .corr-item__body p:last-child{margin-bottom:0}
    .corr-item__body strong{color:var(--accent);font-weight:600}
    .corr-item__body .math-display,.corr-item__body .katex-display{margin:var(--space-md) 0;overflow-x:hidden}
    .corr-item__body pre{background:rgba(0,0,0,.04);padding:var(--space-md);border-radius:8px;overflow-x:auto;margin-bottom:var(--space-md)}
    .corr-item__body code{font-family:var(--font-mono);font-size:.8rem}
    [data-theme="dark"] .corr-item{background:rgba(212,160,75,.06)}
    [data-theme="dark"] .corr-item__body pre{background:rgba(255,255,255,.05)}

    .loading{text-align:center;padding:var(--space-3xl);color:var(--ink-muted);font-size:.9rem}
    .error{text-align:center;padding:var(--space-3xl);color:#CC4545}

    /* Code blocks for info exercises */
    .code-block{background:rgba(0,0,0,.04);padding:var(--space-md);border-radius:8px;overflow-x:auto;margin-bottom:var(--space-md);font-family:var(--font-mono);font-size:.82rem;line-height:1.6}
    [data-theme="dark"] .code-block{background:rgba(255,255,255,.05)}
    code{font-family:var(--font-mono);font-size:.85rem}

    @media(max-width:680px){
      .course__title{font-size:1.8rem}
      .course{padding-left:var(--space-md);padding-right:var(--space-md)}
      .annale-exercice{padding:var(--space-md)}
    }
  </style>

  <article class="course" id="content">
    <p class="loading">Chargement...</p>
  </article>

  <script>
  // Theme toggle
  (function(){
    var btn = document.getElementById('themeToggle');
    if(btn) btn.addEventListener('click', function(){
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if(isDark){document.documentElement.removeAttribute('data-theme');localStorage.setItem('bibmaths-theme','light')}
      else{document.documentElement.setAttribute('data-theme','dark');localStorage.setItem('bibmaths-theme','dark')}
    });
  })();

  // Parse URL params
  var params = new URLSearchParams(window.location.search);
  var banque = params.get('banque') || 'ccinp';
  var annee = params.get('annee') || '2025';
  var epreuve = params.get('epreuve') || 'maths1';
  var section = params.get('section') || 'exo1';
  var chapitre = params.get('chapitre') || '';

  var enoncePath = '../../data/enonces/' + banque + '-' + annee + '-' + epreuve + '-' + section + '.json';
  var container = document.getElementById('content');

  // Load enonce
  fetch(enoncePath)
    .then(function(r) { if (!r.ok) throw new Error('Not found'); return r.json(); })
    .then(function(data) {
      document.title = data.banque + ' ' + data.annee + ' — ' + data.section + ' | LibMaths';

      var html = '';
      // Back button
      html += '<button class="course__back" onclick="history.back()">← Retour</button>';
      // Badge
      html += '<div class="course__meta"><span class="course__badge">' + data.banque + ' ' + data.annee + '</span></div>';
      // Title
      html += '<h1 class="course__title">' + data.epreuve + ' — ' + data.section + '</h1>';
      // Enonce
      html += data.html;
      // Correction section
      html += '<div class="correction-reveal" id="corrSection">';
      html += '<button class="correction-reveal__btn" id="corrBtn">Reveler la correction</button>';
      html += '<div class="correction-reveal__content" id="corrContent"><p class="loading">Chargement de la correction...</p></div>';
      html += '</div>';

      container.innerHTML = html;

      // Add IDs to question divs for anchor navigation
      container.querySelectorAll('.question').forEach(function(q) {
        var numEl = q.querySelector('.question__num');
        if (numEl) {
          var m = numEl.textContent.match(/Q(\d+)/);
          if (m) q.id = 'Q' + m[1];
        }
      });

      // Question filter: only show requested questions (?q=Q6,Q22)
      var qFilter = params.get('q');
      if (qFilter) {
        var wanted = {};
        qFilter.split(',').forEach(function(q) { wanted[q.trim()] = true; });
        var wantedKeys = Object.keys(wanted);

        function isWanted(qId) {
          if (wanted[qId]) return true;
          for (var k in wanted) {
            var kBase = k.replace(/[a-z]+$/i, '');
            if (kBase === qId) return true;
            var qBase = qId.replace(/[a-z]+$/i, '');
            if (qBase === k) return true;
          }
          return false;
        }

        if (wantedKeys.length > 0) {
          // Hide questions that are not in the filter
          container.querySelectorAll('.question[id]').forEach(function(q) {
            if (!isWanted(q.id)) {
              q.style.display = 'none';
            }
          });

          // Hide partie titles that have no visible questions
          container.querySelectorAll('.annale-partie').forEach(function(partie) {
            var visibleQs = partie.querySelectorAll('.question[id]');
            var hasVisible = false;
            visibleQs.forEach(function(q) { if (q.style.display !== 'none') hasVisible = true; });
            if (!hasVisible) partie.style.display = 'none';
          });

          // Add a filter banner
          var backBtn = container.querySelector('.course__back');
          var bannerDiv = document.createElement('div');
          bannerDiv.className = 'question-filter-banner';
          bannerDiv.innerHTML = '<span class="question-filter-banner__label">Questions filtrees</span>' +
            '<span class="question-filter-banner__list">' + wantedKeys.join(', ') + '</span>' +
            '<a href="' + window.location.pathname + '?banque=' + banque + '&annee=' + annee + '&epreuve=' + epreuve + '&section=' + section + '" class="question-filter-banner__show-all">Voir le sujet complet</a>';
          if (backBtn) {
            backBtn.parentNode.insertBefore(bannerDiv, backBtn.nextSibling);
          } else {
            container.insertBefore(bannerDiv, container.firstChild);
          }
        }
      }

      // Helper: jump to hash anchor instantly
      function jumpToHash() {
        if (window.location.hash) {
          var target = document.querySelector(window.location.hash);
          if (target) target.scrollIntoView({ block: 'start', behavior: 'instant' });
        }
      }

      // Render KaTeX, then jump to anchor
      var katexDelimiters = [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\[', right: '\\]', display: true},
        {left: '\\(', right: '\\)', display: false}
      ];
      if (window.renderMathInElement) {
        renderMathInElement(container, { delimiters: katexDelimiters, throwOnError: false });
        jumpToHash();
      } else {
        var iv = setInterval(function() {
          if (window.renderMathInElement) {
            clearInterval(iv);
            renderMathInElement(container, { delimiters: katexDelimiters, throwOnError: false });
            jumpToHash();
          }
        }, 100);
      }

      // Correction reveal button
      var corrBtn = document.getElementById('corrBtn');
      var corrContent = document.getElementById('corrContent');
      var corrLoaded = false;

      corrBtn.addEventListener('click', function() {
        if (corrContent.classList.contains('visible')) {
          corrContent.classList.remove('visible');
          corrContent.style.display = 'none';
          corrBtn.textContent = 'Reveler la correction';
          return;
        }

        if (!corrLoaded) {
          // Find matching corrections from the chapter corrections file
          // We need to find which chapter this exercise belongs to
          loadCorrections(data, corrContent, function() {
            corrLoaded = true;
            corrContent.style.display = '';
            corrContent.classList.add('visible');
            corrBtn.textContent = 'Masquer la correction';
            // Render KaTeX in corrections
            if (window.renderMathInElement) {
              renderMathInElement(corrContent, {
                delimiters: [
                  {left: '$$', right: '$$', display: true},
                  {left: '$', right: '$', display: false},
                  {left: '\\[', right: '\\]', display: true},
                  {left: '\\(', right: '\\)', display: false}
                ],
                throwOnError: false
              });
            }
          });
        } else {
          corrContent.style.display = '';
          corrContent.classList.add('visible');
          corrBtn.textContent = 'Masquer la correction';
        }
      });
    })
    .catch(function(err) {
      container.innerHTML = '<button class="course__back" onclick="history.back()">← Retour</button>' +
        '<p class="error">Enonce non disponible pour cette reference.</p>' +
        '<p style="text-align:center;color:var(--ink-muted);font-size:.85rem">(' + enoncePath + ')</p>';
    });

  function loadCorrections(data, corrContent, callback) {
    // Search through all correction files to find matching ones
    // The corrections are organized by chapter, but we need to match by banque+epreuve+section
    // We'll use the exercices.json index to find which chapters reference this epreuve
    fetch('../../data/exercices.json')
      .then(function(r) { return r.json(); })
      .then(function(exData) {
        var epreuveStr = data.epreuve + ' ' + data.annee;
        // Find chapters that have references matching this epreuve
        var matchingChapters = [];
        exData.c.forEach(function(ch) {
          ch.refs.forEach(function(ref) {
            if (ref.e === epreuveStr && ref.b === 'C') {
              if (matchingChapters.indexOf(ch.id) === -1) matchingChapters.push(ch.id);
            }
          });
        });

        if (matchingChapters.length === 0) {
          corrContent.innerHTML = '<p style="color:var(--ink-muted);text-align:center">Aucune correction disponible.</p>';
          callback();
          return;
        }

        // Load corrections from matching chapters
        var promises = matchingChapters.map(function(chId) {
          return fetch('../../data/corrections/' + chId + '.json').then(function(r) { return r.json(); });
        });

        Promise.all(promises).then(function(allCorrs) {
          var html = '';
          var found = 0;

          // If question filter is active, only show corrections for visible questions
          var wantedCorr = null;
          var qFilter = params.get('q');
          if (qFilter) {
            wantedCorr = {};
            qFilter.split(',').forEach(function(q) { wantedCorr[q.trim()] = true; });
          }

          allCorrs.forEach(function(corrList) {
            corrList.forEach(function(ref) {
              if (ref.banque === 'CCINP' && ref.epreuve === epreuveStr) {
                ref.corrections.forEach(function(c) {
                  // Skip corrections not matching the question filter
                  if (wantedCorr && !wantedCorr[c.question]) return;
                  html += '<div class="corr-item">';
                  html += '<div class="corr-item__q">' + escHtml(c.question) + ' — ' + escHtml(ref.partie || '') + '</div>';
                  html += '<div class="corr-item__body">' + formatCorr(c.correction || '') + '</div>';
                  html += '</div>';
                  found++;
                });
              }
            });
          });

          if (found === 0) {
            corrContent.innerHTML = '<p style="color:var(--ink-muted);text-align:center">Aucune correction disponible.</p>';
          } else {
            corrContent.innerHTML = '<p style="font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:var(--space-lg)">' + found + ' correction' + (found > 1 ? 's' : '') + '</p>' + html;
          }
          callback();
        });
      })
      .catch(function() {
        corrContent.innerHTML = '<p style="color:var(--ink-muted);text-align:center">Erreur de chargement.</p>';
        callback();
      });
  }

  function formatCorr(text) {
    // Extract code blocks first to protect them
    var codeBlocks = [];
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m, lang, code) {
      codeBlocks.push('<pre><code>' + escHtml(code.trim()) + '</code></pre>');
      return '\x00CODE' + (codeBlocks.length - 1) + '\x00';
    });

    // Bold markers: **text** -> <strong>
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Promote long inline math to display math
    // Match $...$ (not $$) containing heavy operators and long enough
    // Also capture trailing punctuation to avoid orphan dots
    text = text.replace(/(?<!\$)\$(?!\$)((?:[^$]|\\\$)+?)\$(?!\$)([.,;]?)/g, function(m, inner, punct) {
      if (inner.length > 50 && /\\(sum|prod|frac|int|lim|begin|underset|overset)/.test(inner)) {
        return '$$' + inner + (punct || '') + '$$';
      }
      return m;
    });

    // Split on double newlines first
    var blocks = text.split(/\n\n+/);
    var html = '';

    blocks.forEach(function(block) {
      block = block.trim();
      if (!block) return;

      // Restore code blocks
      if (block.indexOf('\x00CODE') !== -1) {
        block = block.replace(/\x00CODE(\d+)\x00/g, function(m, i) { return codeBlocks[parseInt(i)]; });
        html += block;
        return;
      }

      // Split long single-paragraph blocks into sentences
      // Split on ". " followed by uppercase letter (new sentence/step)
      var sentences = block.split(/(?<=\.)\s+(?=[A-ZÀ-ÜÉÈ])/);

      if (sentences.length <= 1) {
        html += '<p>' + block.replace(/\n/g, '<br>') + '</p>';
      } else {
        sentences.forEach(function(s) {
          s = s.trim();
          // Skip orphan punctuation (e.g. lone "." after display math)
          if (s && !/^[.,;:!?]$/.test(s)) html += '<p>' + s + '</p>';
        });
      }
    });

    // Restore any remaining code blocks
    html = html.replace(/\x00CODE(\d+)\x00/g, function(m, i) { return codeBlocks[parseInt(i)]; });

    return html;
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  </script>
